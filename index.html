<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Handmade Anime</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            color: #333;
            margin: 0;
            padding: 0;
            text-align: center;
        }
        header {
            background-color: #333;
            color: #fff;
            padding: 1rem 0;
        }
        main {
            padding: 2rem;
        }
        .video-container {
            position: relative;
            width: 80%;
            padding-top: 45%; 
            margin: 0 auto;
        }
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <header>
        <h1>Студия Handmade Anime</h1>
    </header>
    <main>
        <h2>Новая серия уже здесь!</h2>
        <div class="video-container">
            <iframe src="https://www.youtube.com/embed/ЗДЕСЬ_ДОЛЖЕН_БЫТЬ_ID_ВАШЕГО_ВИДЕО" allowfullscreen></iframe>
        </div>
    </main>
</body>
</html>
